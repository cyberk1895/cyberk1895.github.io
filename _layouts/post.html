---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  <div class="post-meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
    {% if page.tags %}
      <span>{{ page.tags | join: " / " }}</span>
    {% endif %}
  </div>

  <div class="entry">
    {{ content }}
  </div>
</article>
